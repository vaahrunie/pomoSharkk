<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PomoShark 🦈</title>
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pastel-blue:   #a8c8e8;
      --pastel-blue2:  #c5ddf4;
      --pastel-blue3:  #deeef9;
      --deep-blue:     #5b8ab5;
      --accent:        #7fb3d3;
      --text:          #3a6080;
      --text-light:    #6a90aa;
      --white:         #ffffff;
      --ring-bg:       rgba(168,200,232,0.25);
      --ring-track:    rgba(90,138,181,0.18);
      --shadow:        rgba(90,138,181,0.18);
    }

    @font-face {
      font-family: '8bit';
      src: local('8bit Operator'), local('8bitOperator'), local('8Bit Operator+'), local('Press Start 2P');
    }

    html, body {
      width: 100%; min-height: 100vh;
      font-family: '8bit', 'Press Start 2P', monospace;
    }

    body {
      background-image: url('Untitled design (1).png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 60px;
      color: var(--text);
    }

    /* overlay tint */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(200,228,248,0.35);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT WRAPPER ─── */
    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; width: 100%; max-width: 520px;
    }

    /* ─── TITLE ─── */
    h1 {
      font-size: clamp(14px, 3.5vw, 22px);
      color: var(--deep-blue);
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
      text-align: center;
      margin-top: 10px;
    }
    h1 span { color: var(--accent); }

    /* ─── MODE TABS ─── */
    .tabs {
      display: flex; gap: 8px;
      background: rgba(255,255,255,0.55);
      border: 2px solid var(--pastel-blue);
      border-radius: 12px;
      padding: 6px;
      backdrop-filter: blur(6px);
    }
    .tab-btn {
      font-family: inherit;
      font-size: 9px;
      padding: 8px 14px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--pastel-blue2);
      border-color: var(--accent);
      color: var(--deep-blue);
    }

    /* ─── CYCLE COUNTER ─── */
    .cycle-info {
      font-size: 9px;
      color: var(--text-light);
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
    }

    /* ─── CIRCLE RING ─── */
    .ring-container {
      position: relative;
      width: 280px; height: 280px;
      display: flex; align-items: center; justify-content: center;
    }

    .ring-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 18;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke .4s;
      filter: drop-shadow(0 0 6px rgba(127,179,211,0.6));
    }

    /* ─── SHARK orbiting the ring ─── */
    .shark-orbit {
      position: absolute;
      width: 56px; height: 56px;
      /* positioned via JS */
      top: 0; left: 0;
      transform-origin: center center;
      pointer-events: none;
      image-rendering: pixelated;
      transition: transform .05s linear;
    }

    x@keyframes swim {
  0%   { transform: scaleX(1) rotate(0deg); }
  25%  { transform: scaleX(1) rotate(3deg); }
  50%  { transform: scaleX(1) rotate(0deg); }
  75%  { transform: scaleX(1) rotate(-3deg); }
  100% { transform: scaleX(1) rotate(0deg); }
}

@keyframes swimFlip {
  0%   { transform: scaleX(-1) rotate(0deg); }
  25%  { transform: scaleX(-1) rotate(3deg); }
  50%  { transform: scaleX(-1) rotate(0deg); }
  75%  { transform: scaleX(-1) rotate(-3deg); }
  100% { transform: scaleX(-1) rotate(0deg); }
}

    /* ─── TIMER DISPLAY ─── */
    .timer-face {
      position: relative; z-index: 2;
      text-align: center;
    }

    .time-display {
      font-size: clamp(32px, 10vw, 52px);
      color: var(--deep-blue);
      letter-spacing: 4px;
      text-shadow: 3px 3px 0 rgba(255,255,255,0.8);
      line-height: 1;
    }

    /* ─── BUTTONS ─── */
    .controls {
      display: flex; gap: 12px; align-items: center;
    }

    .btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 12px 28px;
      border-radius: 10px;
      border: 2px solid var(--accent);
      cursor: pointer;
      transition: all .15s;
      background: rgba(255,255,255,0.7);
      color: var(--deep-blue);
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: var(--pastel-blue2); transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--pastel-blue);
      color: var(--white);
      border-color: var(--deep-blue);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }
    .btn-primary:hover { background: var(--accent); }

    .btn-icon {
      padding: 12px 16px;
      font-size: 14px;
    }

    /* ─── POMO DOTS ─── */
    .pomo-dots {
      display: flex; gap: 8px; align-items: center;
      font-size: 8px; color: var(--text-light); letter-spacing: 1px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      transition: background .3s;
    }
    .dot.filled { background: var(--accent); }

    /* ─── PANELS (SHARED) ─── */
    .settings-panel, .music-panel {
      background: rgba(255,255,255,0.65);
      border: 2px solid var(--pastel-blue2);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(8px);
      width: 100%;
      display: none;
    }
    .settings-panel.open, .music-panel.open { display: block; }

    .settings-panel h2, .music-panel h2 {
      font-size: 10px; letter-spacing: 2px;
      color: var(--deep-blue); margin-bottom: 16px; text-align: center;
    }

    .setting-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 12px;
      font-size: 8px; color: var(--text-light); letter-spacing: 1px;
    }

    .setting-row input[type="number"] {
      font-family: inherit; font-size: 10px;
      width: 56px; padding: 6px 8px;
      border: 2px solid var(--pastel-blue);
      border-radius: 6px;
      background: rgba(255,255,255,0.8);
      color: var(--deep-blue);
      text-align: center;
    }

    /* ─── MUSIC SPECIFIC STYLES ─── */
    .music-header {
      display: flex; gap: 10px; margin-bottom: 15px;
    }
    #musicSelect {
      flex-grow: 1; font-family: inherit; font-size: 9px;
      padding: 8px; border: 2px solid var(--pastel-blue);
      border-radius: 8px; color: var(--text);
    }
    .btn-small {
      padding: 8px 12px; font-size: 12px; border-radius: 8px;
    }
    .timeline-container {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; font-size: 8px;
    }
    .music-slider {
      flex-grow: 1; cursor: pointer; height: 4px;
      accent-color: var(--accent);
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative; z-index: 1;
      font-size: 7px; color: var(--text-light);
      letter-spacing: 1px; text-align: center;
      margin-top: 20px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.7);
    }

    /* ─── NOTIFICATION TOAST ─── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--pastel-blue);
      color: var(--white);
      font-family: inherit; font-size: 9px; letter-spacing: 1px;
      padding: 12px 24px;
      border-radius: 10px;
      border: 2px solid var(--deep-blue);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      text-align: center;
      max-width: 300px;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="app">
  <h1>POMO<span>SHARK</span> 🦈</h1>

  <!-- MODE TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-mode="pomodoro">POMODORO</button>
    <button class="tab-btn" data-mode="short">SHORT BREAK</button>
    <button class="tab-btn" data-mode="long">LONG BREAK</button>
  </div>

  <!-- CYCLE INFO -->
  <div class="cycle-info" id="cycleInfo">CYCLE: 1 &nbsp;|&nbsp; POMODORO</div>

  <!-- RING + SHARK + TIMER -->
  <div class="ring-container" id="ringContainer">
    <svg class="ring-svg" viewBox="0 0 280 280">
      <circle class="ring-track" cx="140" cy="140" r="128" />
      <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="128"
        stroke-dasharray="804.25" stroke-dashoffset="0" />
    </svg>

    <img id="sharkOrbit" class="shark-orbit"
      src="oie_ND1QFmiGk68k.png"
      alt="shark" />

    <div class="timer-face">
      <div class="time-display" id="timeDisplay">25:00</div>
    </div>
  </div>

  <!-- POMO DOTS (4 per cycle) -->
  <div class="pomo-dots" id="pomoDots">
    <span>SESSION</span>
    <div class="dot filled" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-icon" id="resetBtn" title="Reset">↺</button>
    <button class="btn btn-primary" id="startBtn">START</button>
    <button class="btn btn-icon" id="musicBtn" title="Music">🎵</button>
    <button class="btn btn-icon" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <!-- MUSIC PANEL -->
  <div class="music-panel" id="musicPanel">
    <h2>✦ MUSIC PLAYER ✦</h2>
    <div class="music-header">
      <select id="musicSelect">
        <option value="" disabled selected>Select a song...</option>
        <option value="Ghostrifter-Official-Devyzed-Downtown-Glow(chosic.com).mp3">Downtown Glow</option>
        <option value="Heart-Of-The-Ocean(chosic.com).mp3">Heart Of The Ocean</option>
        <option value="Daydreams-chosic.com_.mp3">Daydreams</option>
        <option value="Colorful-Flowers(chosic.com).mp3">Colorful Flowers</option>
      </select>
      <button class="btn btn-icon btn-small" id="playPauseMusic" title="Play/Pause">▶</button>
    </div>
    
    <div class="timeline-container">
      <span id="currentTime">0:00</span>
      <input type="range" id="musicTimeline" class="music-slider" min="0" value="0" step="1">
      <span id="durationTime">0:00</span>
    </div>
    <div class="setting-row">
        <span>VOLUME</span>
        <input type="range" id="volumeSlider" class="music-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-panel" id="settingsPanel">
    <h2>✦ SETTINGS ✦</h2>
    <div class="setting-row">
      <span>POMODORO (MIN)</span>
      <input type="number" id="setPomodoro" value="25" min="1" max="60" />
    </div>
    <div class="setting-row">
      <span>SHORT BREAK (MIN)</span>
      <input type="number" id="setShort" value="5" min="1" max="30" />
    </div>
    <div class="setting-row">
      <span>LONG BREAK (MIN)</span>
      <input type="number" id="setLong" value="15" min="1" max="60" />
    </div>
    <div style="text-align:center; margin-top:14px;">
      <button class="btn btn-primary" id="applySettings">APPLY</button>
    </div>
  </div>
</div>

<footer>© 2026 POMOSHARK · made by your amazing friend Ashley 🦈</footer>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────
let config = { pomodoro: 25, short: 5, long: 15 };
let modeMinutes = { pomodoro: 25, short: 5, long: 15 };

let currentMode = 'pomodoro';
let totalSeconds = 25 * 60;
let remainingSeconds = totalSeconds;
let running = false;
let interval = null;
let cycle = 1;
let sessionInCycle = 0; // 0-3 pomodoros completed
let sharkAngle = 0;
let animFrame = null;

const CIRCUMFERENCE = 2 * Math.PI * 128; // 804.25

// ─── ELEMENTS ─────────────────────────────────────────
const timeDisplay  = document.getElementById('timeDisplay');
const cycleInfo    = document.getElementById('cycleInfo');
const ringProgress = document.getElementById('ringProgress');
const sharkOrbit   = document.getElementById('sharkOrbit');
const ringContainer= document.getElementById('ringContainer');
const startBtn     = document.getElementById('startBtn');
const resetBtn     = document.getElementById('resetBtn');
const settingsBtn  = document.getElementById('settingsBtn');
const settingsPanel= document.getElementById('settingsPanel');
const musicBtn     = document.getElementById('musicBtn');
const musicPanel   = document.getElementById('musicPanel');
const toast        = document.getElementById('toast');

const dots = [0,1,2,3].map(i => document.getElementById('dot'+i));

// ─── MUSIC ELEMENTS ───────────────────────────────────
const musicSelect = document.getElementById('musicSelect');
const musicTimeline = document.getElementById('musicTimeline');
const currentTimeText = document.getElementById('currentTime');
const durationTimeText = document.getElementById('durationTime');
const volumeSlider = document.getElementById('volumeSlider');
const playPauseBtn = document.getElementById('playPauseMusic');
const bgMusic = new Audio();

// ─── UTILS ────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }

function formatTime(s){
  return pad(Math.floor(s/60)) + ':' + pad(s%60);
}

function showToast(msg, duration=2800){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), duration);
}

// ─── RING & SHARK ─────────────────────────────────────
function updateRing(){
  const ratio = remainingSeconds / totalSeconds;
  const offset = CIRCUMFERENCE * (1 - ratio);
  ringProgress.style.strokeDashoffset = offset;
}

function positionShark(){
  const ratio = remainingSeconds / totalSeconds;
  const angle = -90 + (1 - ratio) * 360;
  sharkAngle = angle;

  const rad = angle * Math.PI / 180;
  const r = 128;
  const cx = 140, cy = 140;

  const x = cx + r * Math.cos(rad);
  const y = cy + r * Math.sin(rad);

  const pxX = (x / 280) * ringContainer.offsetWidth;
  const pxY = (y / 280) * ringContainer.offsetHeight;

  const w = sharkOrbit.offsetWidth  || 56;
  const h = sharkOrbit.offsetHeight || 56;

  sharkOrbit.style.left = (pxX - w/2) + 'px';
  sharkOrbit.style.top  = (pxY - h/2) + 'px';

  if (Math.cos(rad) < 0) {
  sharkOrbit.style.animation = 'swimFlip 1s ease-in-out infinite';
} else {
  sharkOrbit.style.animation = 'swim 1s ease-in-out infinite';
}
}

// ─── DOTS ─────────────────────────────────────────────
function updateDots(){
  dots.forEach((d,i) => {
    d.classList.toggle('filled', i < sessionInCycle);
  });
}

// ─── CYCLE LABEL ──────────────────────────────────────
function updateCycleLabel(){
  const modeLabel = currentMode === 'pomodoro' ? 'POMODORO'
                  : currentMode === 'short'    ? 'SHORT BREAK' : 'LONG BREAK';
  cycleInfo.textContent = `CYCLE: ${cycle}  |  ${modeLabel}`;
}

// ─── TICK ─────────────────────────────────────────────
function tick(){
  if(remainingSeconds > 0){
    remainingSeconds--;
    timeDisplay.textContent = formatTime(remainingSeconds);
    updateRing();
    positionShark();
  } else {
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'START';
    onTimerEnd();
  }
}

function onTimerEnd(){
  if(currentMode === 'pomodoro'){
    sessionInCycle = Math.min(sessionInCycle + 1, 4);
    updateDots();
    if(sessionInCycle >= 4){
      showToast('🦈 LONG BREAK TIME! Great work!');
      sessionInCycle = 0;
      setMode('long');
    } else {
      showToast('🌊 TAKE A SHORT BREAK!');
      setMode('short');
    }
  } else if(currentMode === 'short'){
    showToast('🦈 BACK TO WORK!');
    setMode('pomodoro');
  } else {
    cycle++;
    sessionInCycle = 0;
    updateDots();
    showToast(`✨ CYCLE ${cycle} BEGINS!`);
    setMode('pomodoro');
  }
  updateCycleLabel();
}

// ─── MODE SWITCH ──────────────────────────────────────
function setMode(mode){
  currentMode = mode;
  totalSeconds = modeMinutes[mode] * 60;
  remainingSeconds = totalSeconds;

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });

  timeDisplay.textContent = formatTime(remainingSeconds);
  updateRing();
  positionShark();
  updateCycleLabel();

  if(running){
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'START';
  }
}

// ─── MUSIC LOGIC ──────────────────────────────────────
musicSelect.addEventListener('change', () => {
    bgMusic.src = musicSelect.value;
    bgMusic.play();
    playPauseBtn.textContent = '⏸';
});

playPauseBtn.addEventListener('click', () => {
    if(!bgMusic.src) return;
    if(bgMusic.paused) {
        bgMusic.play();
        playPauseBtn.textContent = '⏸';
    } else {
        bgMusic.pause();
        playPauseBtn.textContent = '▶';
    }
});

bgMusic.addEventListener('loadedmetadata', () => {
    musicTimeline.max = Math.floor(bgMusic.duration);
    durationTimeText.textContent = formatTime(Math.floor(bgMusic.duration));
});

bgMusic.addEventListener('timeupdate', () => {
    musicTimeline.value = Math.floor(bgMusic.currentTime);
    currentTimeText.textContent = formatTime(Math.floor(bgMusic.currentTime));
});

musicTimeline.addEventListener('input', () => {
    bgMusic.currentTime = musicTimeline.value;
});

volumeSlider.addEventListener('input', () => {
    bgMusic.volume = volumeSlider.value;
});

// ─── CONTROLS ─────────────────────────────────────────
startBtn.addEventListener('click', () => {
  if(!running){
    running = true;
    startBtn.textContent = 'PAUSE';
    interval = setInterval(tick, 1000);
  } else {
    running = false;
    startBtn.textContent = 'START';
    clearInterval(interval);
  }
});

resetBtn.addEventListener('click', () => {
  clearInterval(interval);
  running = false;
  startBtn.textContent = 'START';
  remainingSeconds = totalSeconds;
  timeDisplay.textContent = formatTime(remainingSeconds);
  updateRing();
  positionShark();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

settingsBtn.addEventListener('click', () => {
  musicPanel.classList.remove('open');
  settingsPanel.classList.toggle('open');
});

musicBtn.addEventListener('click', () => {
  settingsPanel.classList.remove('open');
  musicPanel.classList.toggle('open');
});

document.getElementById('applySettings').addEventListener('click', () => {
  const p = parseInt(document.getElementById('setPomodoro').value) || 25;
  const s = parseInt(document.getElementById('setShort').value)    || 5;
  const l = parseInt(document.getElementById('setLong').value)     || 15;
  modeMinutes = { pomodoro: p, short: s, long: l };
  settingsPanel.classList.remove('open');
  setMode(currentMode);
  showToast('✓ SETTINGS APPLIED!');
});

// ─── INIT ─────────────────────────────────────────────
window.addEventListener('load', () => {
  updateRing();
  positionShark();
  updateDots();
  updateCycleLabel();
});

window.addEventListener('resize', positionShark);
</script>
</body>
</html>
